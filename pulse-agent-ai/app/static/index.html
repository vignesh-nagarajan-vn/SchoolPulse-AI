<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pulse Agent AI</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="header">
        <div>
          <p class="eyebrow">SchoolPrint AI</p>
          <h1>Pulse Agent AI</h1>
          <p class="subhead">Backend test dashboard for hidden water, energy, waste, event, and transportation footprint intelligence.</p>
        </div>
        <button id="refresh">Refresh</button>
      </section>

      <section class="metrics" id="metrics"></section>

      <section class="agent">
        <label for="query">Ask the school operations agent</label>
        <div class="query-row">
          <input id="query" value="What should we fix first before the next big event?" />
          <button id="ask">Ask</button>
        </div>
        <p id="answer" class="answer"></p>
      </section>

      <section>
        <h2>Top Action Cards</h2>
        <div class="cards" id="cards"></div>
      </section>
    </main>

    <script>
      async function getJson(url, options) {
        const response = await fetch(url, options);
        if (!response.ok) throw new Error(`Request failed: ${response.status}`);
        return response.json();
      }

      function metric(label, value) {
        return `<article class="metric"><span>${label}</span><strong>${value}</strong></article>`;
      }

      function card(item) {
        return `<article class="card">
          <div class="card-top">
            <span>${item.module}</span>
            <strong>${item.priority}</strong>
          </div>
          <h3>${item.title}</h3>
          <p>${item.recommendation}</p>
          <p class="muted">${item.evidence}</p>
          <p class="impact">${item.estimated_impact}</p>
        </article>`;
      }

      async function loadOverview() {
        const data = await getJson("/api/overview");
        const totals = data.impact_totals;
        document.getElementById("metrics").innerHTML = [
          metric("Wasted kWh", totals.estimated_wasted_kwh),
          metric("Water gallons at risk", totals.open_water_gallons_at_risk),
          metric("Food waste lb", totals.food_waste_lbs_logged),
          metric("Events analyzed", totals.events_analyzed)
        ].join("");
        document.getElementById("cards").innerHTML = data.top_action_cards.map(card).join("");
      }

      async function askAgent() {
        const query = document.getElementById("query").value;
        const data = await getJson("/api/agent/query", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({query})
        });
        document.getElementById("answer").textContent = data.answer;
      }

      document.getElementById("refresh").addEventListener("click", loadOverview);
      document.getElementById("ask").addEventListener("click", askAgent);
      loadOverview();
      askAgent();
    </script>
  </body>
</html>
